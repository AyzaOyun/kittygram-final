name: CI/CD Kittygram

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: получить код
        uses: actions/checkout@v3

      - name: поставить python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: поставить зависимости
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8==6.0.0 flake8-isort==6.0.0

      - name: проверить код flake8
        run: |
          cd backend
          python -m flake8 . --exclude=migrations --ignore=E501,W291,W292,W293,I001,I003,I004,F401,E123,E301

      - name: запустить тесты
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
        run: |
          python -m pytest tests/ -v --disable-warnings

  build_and_push_backend:
    name: собрать и отправить backend
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: получить код
        uses: actions/checkout@v3

      - name: настроить docker buildx
        uses: docker/setup-buildx-action@v2

      - name: войти в docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: собрать и отправить
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

  build_and_push_frontend:
    name: собрать и отправить frontend
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: получить код
        uses: actions/checkout@v3

      - name: настроить docker buildx
        uses: docker/setup-buildx-action@v2

      - name: войти в docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: собрать и отправить
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

  build_and_push_gateway:
    name: собрать и отправить gateway
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: получить код
        uses: actions/checkout@v3

      - name: настроить docker buildx
        uses: docker/setup-buildx-action@v2

      - name: войти в docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: собрать и отправить
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  deploy:
    runs-on: ubuntu-latest
    needs: 
      - build_and_push_backend
      - build_and_push_frontend
      - build_and_push_gateway

    steps:
      - name: развернуть на сервере
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/kittygram
            cat > .env << EOF
            DB_ENGINE=${{ secrets.DB_ENGINE }}
            DB_NAME=${{ secrets.DB_NAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            EOF
            sudo docker compose down
            sudo docker compose pull
            sudo docker compose up -d
            sleep 15
            sudo docker compose exec -T backend python manage.py migrate
            sudo docker compose exec -T backend python manage.py collectstatic --no-input

  auto_tests:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: проверить доступность после деплоя
        run: |
          sleep 30
          status_code=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SSH_HOST }}:9000)
          if [ "$status_code" -eq 200 ] || [ "$status_code" -eq 301 ] || [ "$status_code" -eq 302 ]; then
            echo "приложение запущено (HTTP $status_code)"
          else
            echo "ошибка: HTTP $status_code"
            exit 1
          fi

  telegram_notify:
    runs-on: ubuntu-latest
    needs: auto_tests

    steps:
      - name: отправить в телеграм
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            kittygram обновлен
            
            проект доступен по адресу:
            http://${{ secrets.SSH_HOST }}:9000
            
            репозиторий: ${{ github.repository }}
            ветка: ${{ secrets.REF_NAME }}
            автор: ${{ secrets.ACTOR }}
            