name: CI/CD Kittygram

on:
  push:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: получить код
        uses: actions/checkout@v3

      - name: поставить python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: поставить зависимости
        run: |
          cd backend
          pip install -r requirements.txt

      - name: запустить тесты
        run: |
          cd backend
          python -m pytest tests/ -v --disable-warnings

      - name: проверить код flake8
        run: |
          cd backend
          pip install flake8
          flake8 . --max-line-length=120 --exclude=migrations

  build_and_push:
    name: отправить образы в dockerhub
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: получить код
        uses: actions/checkout@v3

      - name: настроить docker buildx
        uses: docker/setup-buildx-action@v2

      - name: войти в docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: собрать и отправить бэкенд
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

      - name: собрать и отправить фронтенд
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

      - name: собрать и отправить gateway
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: развернуть на сервере
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/kittygram
            cat > .env << EOF
            DB_ENGINE=${{ secrets.DB_ENGINE }}
            DB_NAME=${{ secrets.DB_NAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False
            EOF
            sudo docker compose down
            sudo docker compose pull
            sudo docker compose up -d
            sleep 10
            sudo docker compose exec -T backend python manage.py migrate
            sudo docker compose exec -T backend python manage.py collectstatic --no-input

  auto_tests:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: тесты после деплоя
        run: |
          sleep 30
          status_code=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SSH_HOST }})
          if [ "$status_code" -eq 200 ] || [ "$status_code" -eq 301 ] || [ "$status_code" -eq 302 ]; then
            echo "приложение запущено (HTTP $status_code)"
          else
            echo "ошибка: HTTP $status_code"
            exit 1
          fi

  telegram-notify:
    needs: auto_tests
    runs-on: ubuntu-latest
    steps:
      - name: отправить в телеграм
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Kittygram готов!
            
            Котэсайт доступен по адресу:
            http://${{ secrets.SSH_HOST }}
            
            репозиторий: ${{ github.repository }}
            ветка: ${{ github.ref_name }}
            автор: ${{ github.actor }}
