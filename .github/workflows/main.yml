name: kittygram ci/cd

on:
  push:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: получить код
        uses: actions/checkout@v3

      - name: установить системные зависимости
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev zlib1g-dev libpq-dev

      - name: поставить python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: поставить зависимости
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: проверить код
        run: |
          cd backend
          pip install flake8
          flake8 . --max-line-length=120 --ignore=E123,E301,I005,W391,E501,W291,W292,W293,F401,E262,E261,E265

      - name: запустить тесты
        run: |
          cd backend
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --disable-warnings
          else
            echo "нет папки tests"
          fi

      - name: проверить фронтенд
        run: |
          cd frontend
          npm ci
          npm run build

  build_and_push:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: получить код
        uses: actions/checkout@v3

      - name: настроить docker buildx
        uses: docker/setup-buildx-action@v2

      - name: войти в docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: собрать и отправить бэкенд
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

      - name: собрать и отправить фронтенд
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

      - name: собрать и отправить gateway
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  deploy:
  needs: build_and_push
  runs-on: ubuntu-latest
  steps:
    - name: развернуть на сервере
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd ~/kittygram
          
          # Создаем .env
          cat > .env << EOF
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DB_ENGINE=${{ secrets.DB_ENGINE }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
          EOF
          
          # Создаем nginx конфиг
          mkdir -p nginx_config
          cat > nginx_config/default.conf << 'NGINX_EOF'
          server {
              listen 80;
              server_name _;
              client_max_body_size 20M;
              
              # API запросы
              location /api/ {
                  proxy_set_header Host $http_host;
                  proxy_pass http://backend:8000/api/;
              }
              
              # Админка Django
              location /admin/ {
                  proxy_set_header Host $http_host;
                  proxy_pass http://backend:8000/admin/;
              }
              
              # Медиа файлы
              location /media/ {
                  alias /media/;
              }
              
              # Статика Django
              location /static/ {
                  alias /static/backend/;
                  try_files $uri =404;
              }
              
              # Frontend SPA
              location / {
                  alias /static/frontend/;
                  try_files $uri $uri/ /index.html;
              }
          }
          NGINX_EOF
          
          # Создаем docker-compose.yml
          cat > docker-compose.yml << 'DOCKER_EOF'
          services:
            postgres:
              image: postgres:13
              env_file:
                - .env
              volumes:
                - pg_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
                interval: 10s
                timeout: 5s
                retries: 5
            
            backend:
              image: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest
              env_file:
                - .env
              volumes:
                - backend_static:/app/collected_static
                - media_volume:/app/media
              depends_on:
                postgres:
                  condition: service_healthy
              command: >
                sh -c "python manage.py migrate &&
                       python manage.py collectstatic --noinput &&
                       gunicorn kittygram_backend.wsgi:application --bind 0.0.0.0:8000"
            
            frontend:
              image: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest
              volumes:
                - frontend_static:/app/build
            
            gateway:
              image: nginx:1.21-alpine
              ports:
                - "9000:80"
              volumes:
                - backend_static:/static/backend
                - frontend_static:/static/frontend
                - media_volume:/media
                - ./nginx_config/default.conf:/etc/nginx/conf.d/default.conf:ro
              depends_on:
                - backend
                - frontend
          
          volumes:
            pg_data:
            backend_static:
            frontend_static:
            media_volume:
          DOCKER_EOF
          
          sudo docker compose down
          sudo docker compose pull
          sudo docker compose up -d
            
            # Выполняем миграции и сбор статики
            sudo docker compose exec backend python manage.py migrate --noinput
            sudo docker compose exec backend python manage.py collectstatic --noinput

  auto_tests:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: тесты после деплоя
        run: |
          curl -f http://${{ secrets.SSH_HOST }}:9000

  telegram-notify:
    needs: auto_tests
    runs-on: ubuntu-latest
    steps:
      - name: отправить в телеграм
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            kittygram обновлен
            
            котэсайт: http://${{ secrets.SSH_HOST }}:9000
            репозиторий: ${{ github.repository }}
            ветка: ${{ github.ref_name }}
