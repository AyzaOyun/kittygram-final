server {
    listen 80;
    server_name _;
    client_max_body_size 20M;
    
    # API запросы
    location /api/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/api/;
    }
    
    # Админка Django
    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/admin/;
    }
    
    # Медиа файлы
    location /media/ {
        alias /media/;
    }
    
    # Статика Django (админка и rest_framework)
    location /static/admin/ {
        alias /static/backend/admin/;
    }
    
    location /static/rest_framework/ {
        alias /static/backend/rest_framework/;
    }
    
    # Frontend SPA
    location / {
        alias /static/frontend/;
        try_files $uri $uri/ /index.html;
    }
}
