version: '3.8'

services:
  postgres:
    image: postgres:13
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file:
      - .env

  backend:
    image: ayzaoyun/kittygram_backend:latest
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - postgres
    env_file:
      - .env

  frontend:
    image: ayzaoyun/kittygram_frontend:latest
    volumes:
      - static_volume:/app/static

  gateway:
    image: ayzaoyun/kittygram_gateway:latest
    ports:
      - "9000:80"
    volumes:
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  static_volume:
  media_volume:
  