services:
  postgres:
    image: postgres:13
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ayzaoyun/kittygram_backend:latest
    env_file:
      - .env
    volumes:
      - backend_static:/app/collected_static
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn kittygram_backend.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    image: ayzaoyun/kittygram_frontend:latest
    volumes:
      - frontend_static:/app/build

  gateway:
    image: nginx:1.21-alpine
    ports:
      - "9000:80"
    volumes:
      - backend_static:/static/backend
      - frontend_static:/static/frontend
      - media_volume:/media
      - ./nginx_config/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  backend_static:
  frontend_static:
  media_volume:
